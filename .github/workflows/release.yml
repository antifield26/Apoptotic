name: Release

on:
  push:
    tags:
      - 'v*'             # e.g. v0.1.0, v1.0.0
  workflow_dispatch:     # manual trigger from GitHub Actions UI

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: mc-server

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── ARM64 (Raspberry Pi 5, Debian 13) ──
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: aarch64-linux
          # ── x86_64 (generic Linux server) ──
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: x86_64-linux
          # ── macOS Apple Silicon (dev / local test) ──
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: aarch64-macos

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation deps (ARM64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc

      - name: Strip binary (Linux)
        if: runner.os == 'Linux'
        run: |
          strip target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} || true

      - name: Package archive
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          ARCHIVE_NAME="${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.suffix }}"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            # macOS: create a ditto-based zip (preserves code signature placeholders)
            tar -czf "${ARCHIVE_NAME}.tar.gz" "${{ env.BINARY_NAME }}"
          else
            tar -czf "${ARCHIVE_NAME}.tar.gz" "${{ env.BINARY_NAME }}"
          fi
          echo "ARCHIVE=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
          ls -lh "${ARCHIVE_NAME}.tar.gz"

      - name: SHA256 checksum
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          sha256sum "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"
          cat "${{ env.ARCHIVE }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.suffix }}
          path: |
            target/${{ matrix.target }}/release/${{ env.ARCHIVE }}
            target/${{ matrix.target }}/release/${{ env.ARCHIVE }}.sha256

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## 🚀 Apoptotic ${{ github.ref_name }}

            Minecraft Java Edition 26.2 (protocol 776) LAN server — Rust implementation optimized for Raspberry Pi 5.

            ### Downloads

            | Platform | Binary |
            |---|---|
            | 🥧 **Raspberry Pi 5** (ARM64, Debian 13) | `mc-server-aarch64-linux.tar.gz` |
            | 🖥️ **Linux** (x86_64) | `mc-server-x86_64-linux.tar.gz` |
            | 🍎 **macOS** (Apple Silicon) | `mc-server-aarch64-macos.tar.gz` |

            ### Deployment (RPi 5)

            ```bash
            # Download
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mc-server-${{ github.ref_name }}-aarch64-linux.tar.gz

            # Verify
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mc-server-${{ github.ref_name }}-aarch64-linux.tar.gz.sha256
            sha256sum -c mc-server-${{ github.ref_name }}-aarch64-linux.tar.gz.sha256

            # Extract and run
            tar -xzf mc-server-${{ github.ref_name }}-aarch64-linux.tar.gz
            ./mc-server
            ```

            ### Pre-deployment (RPi 5)

            ```bash
            # Run setup script for optimal performance
            sudo bash scripts/setup-rpi.sh
            ```

            > **⚠️ Requires Rust toolchain or compat libs on target.** For static-linked musl builds, see CI artifacts.
          draft: false
          prerelease: false
          files: artifacts/**/*
