name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation deps (ARM64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (ARM64 cross-compile — check only, skip link)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo check --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Test (native only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --release

      - name: Clippy (native only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo clippy --release -- -D warnings

      - name: Security audit (native only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo install cargo-audit 2>/dev/null || true
          cargo audit || true

      - name: Check binary size
        run: ls -lh target/${{ matrix.target }}/release/mc-server* || true

      # E7: Performance regression check (binary size within acceptable range)
      - name: Performance regression check
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          SIZE_BYTES=$(stat -c%s target/${{ matrix.target }}/release/mc-server 2>/dev/null || echo "0")
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
          echo "Binary size: ${SIZE_MB} MB"
          # Alert if binary exceeds 35MB (baseline ~20-25MB for Rust release builds)
          if [ "$SIZE_MB" -gt 35 ]; then
            echo "⚠️ Warning: binary size ${SIZE_MB}MB exceeds 35MB limit"
          else
            echo "✅ Binary size OK (${SIZE_MB}MB)"
          fi

  # D6: PGO optimization build (scheduled, not per-PR — takes ~5min)
  optimize:
    name: PGO Optimize (aarch64)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
          components: llvm-tools

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu llvm-tools netcat-openbsd

      - name: PGO Build
        run: bash scripts/ci-optimize.sh
        env:
          TARGET: aarch64-unknown-linux-gnu
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload PGO binary
        uses: actions/upload-artifact@v4
        with:
          name: mc-server-aarch64-pgo
          path: target/aarch64-unknown-linux-gnu/release/mc-server

      - name: Check PGO binary size
        run: ls -lh target/aarch64-unknown-linux-gnu/release/mc-server || true
