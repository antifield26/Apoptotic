# Apoptotic Plugin Registry (E3)
# Community plugin index for the plugin marketplace.
# Add your plugin here for discovery via the /plugins command.

[registry]
name = "Apoptotic Community Plugins"
url = "https://github.com/antifield26/Apoptotic"

# Built-in plugins (shipped with server)
[[plugins]]
name = "Core"
version = "1.0.0"
author = "mc-server"
description = "Built-in core plugin — lifecycle hooks + player events"
kind = "native"
enabled = true

